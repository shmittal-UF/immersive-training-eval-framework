<svg width="680" viewBox="0 0 680 490" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Natural Interaction Layer — component architecture</title>
<rect width="680" height="490" fill="white"/>
<defs>
<marker id="g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5"/></marker>
<marker id="b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5"/></marker>
<marker id="t" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5"/></marker>
</defs>

<text x="340" y="18" text-anchor="middle" font-family="Arial" font-size="11" fill="#444441">Natural Interaction Layer (NIL) — internal component architecture</text>

<!-- Input signals row -->
<text x="42" y="38" font-family="Arial" font-size="10" fill="#888780">Input signals (from VR platform sensors)</text>
<rect x="42" y="46" width="130" height="44" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="107" y="65" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#2C2C2A">Voice / speech</text>
<text x="107" y="81" text-anchor="middle" font-family="Arial" font-size="10" fill="#5F5E5A">audio stream</text>

<rect x="186" y="46" width="130" height="44" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="251" y="65" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#2C2C2A">Hand tracking</text>
<text x="251" y="81" text-anchor="middle" font-family="Arial" font-size="10" fill="#5F5E5A">21-point skeleton</text>

<rect x="330" y="46" width="130" height="44" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="395" y="65" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#2C2C2A">Gaze / eye track</text>
<text x="395" y="81" text-anchor="middle" font-family="Arial" font-size="10" fill="#5F5E5A">fixation + saccade</text>

<rect x="474" y="46" width="164" height="44" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="556" y="65" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#2C2C2A">Behavioral signals</text>
<text x="556" y="81" text-anchor="middle" font-family="Arial" font-size="10" fill="#5F5E5A">IMU + response patterns</text>

<!-- Arrows to classifiers -->
<line x1="107" y1="90" x2="107" y2="152" stroke="#888780" stroke-width="0.5" marker-end="url(#g)"/>
<line x1="251" y1="90" x2="251" y2="152" stroke="#888780" stroke-width="0.5" marker-end="url(#g)"/>
<line x1="395" y1="90" x2="395" y2="152" stroke="#888780" stroke-width="0.5" marker-end="url(#g)"/>
<line x1="556" y1="90" x2="556" y2="152" stroke="#888780" stroke-width="0.5" marker-end="url(#g)"/>

<!-- Classifier row -->
<text x="42" y="148" font-family="Arial" font-size="10" fill="#888780">Modality classifiers</text>
<rect x="42" y="154" width="130" height="58" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="107" y="175" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#0C447C">NLU engine</text>
<text x="107" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#185FA5">Intent classification</text>
<text x="107" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#185FA5">slot filling · confidence</text>

<rect x="186" y="154" width="130" height="58" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="251" y="175" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#0C447C">Gesture classifier</text>
<text x="251" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#185FA5">Pose estimation</text>
<text x="251" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#185FA5">gesture vocab · tolerance</text>

<rect x="330" y="154" width="130" height="58" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="395" y="175" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#0C447C">Gaze interpreter</text>
<text x="395" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#185FA5">Attention mapping</text>
<text x="395" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#185FA5">dwell threshold · fallback</text>

<rect x="474" y="154" width="164" height="58" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="556" y="175" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#0C447C">Behavioral analyzer</text>
<text x="556" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#185FA5">Pattern detection</text>
<text x="556" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#185FA5">response timing · variability</text>

<!-- Converging arrows to fusion -->
<line x1="107" y1="212" x2="270" y2="294" stroke="#378ADD" stroke-width="1" fill="none" marker-end="url(#b)"/>
<line x1="251" y1="212" x2="296" y2="294" stroke="#378ADD" stroke-width="1" fill="none" marker-end="url(#b)"/>
<line x1="395" y1="212" x2="376" y2="294" stroke="#378ADD" stroke-width="1" fill="none" marker-end="url(#b)"/>
<line x1="556" y1="212" x2="412" y2="294" stroke="#378ADD" stroke-width="1" fill="none" marker-end="url(#b)"/>

<!-- Fusion engine -->
<text x="42" y="288" font-family="Arial" font-size="10" fill="#888780">Uncertainty-aware fusion</text>
<rect x="190" y="296" width="298" height="64" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
<text x="339" y="318" text-anchor="middle" font-family="Arial" font-size="13" font-weight="500" fill="#0C447C">Multimodal fusion engine</text>
<text x="339" y="338" text-anchor="middle" font-family="Arial" font-size="11" fill="#185FA5">Confidence weighting · uncertainty estimation</text>
<text x="339" y="353" text-anchor="middle" font-family="Arial" font-size="11" fill="#185FA5">conflict resolution · graceful degradation</text>

<!-- Adaptive calibration -->
<rect x="506" y="296" width="132" height="64" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="572" y="318" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#0C447C">Adaptive</text>
<text x="572" y="334" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#0C447C">calibration</text>
<text x="572" y="352" text-anchor="middle" font-family="Arial" font-size="10" fill="#185FA5">per-user profile</text>
<line x1="506" y1="328" x2="488" y2="328" stroke="#378ADD" stroke-width="0.5" marker-end="url(#b)"/>

<!-- Arrow to outputs -->
<line x1="339" y1="360" x2="339" y2="404" stroke="#378ADD" stroke-width="1.5" marker-end="url(#b)"/>

<!-- Output row -->
<text x="42" y="398" font-family="Arial" font-size="10" fill="#888780">Platform-independent output</text>
<rect x="42" y="406" width="176" height="50" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="130" y="424" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#085041">User intent events</text>
<text x="130" y="442" text-anchor="middle" font-family="Arial" font-size="10" fill="#0F6E56">select · navigate · confirm · help</text>

<rect x="232" y="406" width="176" height="50" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="320" y="424" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#085041">Accessibility metadata</text>
<text x="320" y="442" text-anchor="middle" font-family="Arial" font-size="10" fill="#0F6E56">mode · confidence · latency</text>

<rect x="422" y="406" width="216" height="50" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="530" y="424" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#085041">SOMF session events</text>
<text x="530" y="442" text-anchor="middle" font-family="Arial" font-size="10" fill="#0F6E56">timestamped interaction log</text>

<text x="42" y="478" font-family="Arial" font-size="10" fill="#444441">Operates above any VR platform input API — no SDK modification required · motor tolerance configurable per user</text>
</svg>
