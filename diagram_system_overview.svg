<svg width="680" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Open immersive training evaluation framework — system architecture</title>
<rect width="680" height="580" fill="white"/>

<text x="340" y="20" text-anchor="middle" font-family="Arial" font-size="11" fill="#444441">VR training platforms (any vendor)</text>

<rect x="42" y="28" width="128" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="106" y="52" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#2C2C2A">Healthcare sim</text>

<rect x="184" y="28" width="128" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="248" y="52" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#2C2C2A">Workforce training</text>

<rect x="326" y="28" width="128" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="390" y="52" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#2C2C2A">Special education</text>

<rect x="468" y="28" width="170" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="553" y="52" text-anchor="middle" font-family="Arial" font-size="11" font-weight="500" fill="#2C2C2A">Any immersive system</text>

<line x1="106" y1="68" x2="106" y2="138" stroke="#888780" stroke-width="0.5" marker-end="url(#g)"/>
<line x1="248" y1="68" x2="248" y2="138" stroke="#888780" stroke-width="0.5" marker-end="url(#g)"/>
<line x1="390" y1="68" x2="390" y2="138" stroke="#888780" stroke-width="0.5" marker-end="url(#g)"/>
<line x1="553" y1="68" x2="553" y2="138" stroke="#888780" stroke-width="0.5" marker-end="url(#g)"/>

<defs>
<marker id="g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5"/></marker>
<marker id="b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
<path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5"/></marker>
<marker id="t" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
<path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5"/></marker>
<marker id="gr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
<path d="M2 1L8 5L2 9" fill="none" stroke="#639922" stroke-width="1.5"/></marker>
<marker id="s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5"/></marker>
</defs>

<!-- NIL -->
<rect x="42" y="140" width="596" height="72" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
<text x="340" y="168" text-anchor="middle" font-family="Arial" font-size="13" font-weight="500" fill="#0C447C">Natural Interaction Layer (NIL)</text>
<text x="340" y="188" text-anchor="middle" font-family="Arial" font-size="11" fill="#185FA5">AI middleware — interprets voice, gesture, gaze, behavioral signals into platform-independent user intents</text>
<text x="340" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#378ADD">No controller precision required · adaptive calibration per user · operates above any VR platform API</text>

<line x1="340" y1="212" x2="340" y2="252" stroke="#378ADD" stroke-width="1.5" marker-end="url(#b)"/>
<text x="360" y="236" font-family="Arial" font-size="10" fill="#378ADD">session events + intent log</text>

<!-- SOMF -->
<rect x="42" y="254" width="596" height="72" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text x="340" y="282" text-anchor="middle" font-family="Arial" font-size="13" font-weight="500" fill="#085041">Structured Outcome Measurement Framework (SOMF)</text>
<text x="340" y="302" text-anchor="middle" font-family="Arial" font-size="11" fill="#0F6E56">Captures training events → maps to competency dimensions → generates xAPI-compatible portable records</text>
<text x="340" y="319" text-anchor="middle" font-family="Arial" font-size="10" fill="#1D9E75">IEEE P2048 · IMS Global CASE · ADL xAPI profiles · cross-institution comparable</text>

<line x1="340" y1="326" x2="340" y2="366" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#t)"/>
<text x="360" y="350" font-family="Arial" font-size="10" fill="#1D9E75">validated competency records</text>

<!-- ACL -->
<rect x="42" y="368" width="596" height="72" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.8"/>
<text x="340" y="396" text-anchor="middle" font-family="Arial" font-size="13" font-weight="500" fill="#27500A">Accessibility Compliance Layer (ACL)</text>
<text x="340" y="416" text-anchor="middle" font-family="Arial" font-size="11" fill="#3B6D11">WCAG 2.1 Level AA compliance testing + documentation for ADA Title II obligations</text>
<text x="340" y="433" text-anchor="middle" font-family="Arial" font-size="10" fill="#639922">DOJ ADA Title II Final Rule (April 2024) · public entity compliance deadlines · machine-readable VPAT output</text>

<line x1="150" y1="440" x2="150" y2="490" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#s)"/>
<line x1="340" y1="440" x2="340" y2="490" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#s)"/>
<line x1="530" y1="440" x2="530" y2="490" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#s)"/>

<!-- Outputs -->
<rect x="42" y="492" width="212" height="50" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="148" y="511" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#26215C">Credentialing bodies</text>
<text x="148" y="530" text-anchor="middle" font-family="Arial" font-size="10" fill="#534AB7">xAPI competency records</text>

<rect x="268" y="492" width="140" height="50" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="338" y="511" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#26215C">Accreditation</text>
<text x="338" y="530" text-anchor="middle" font-family="Arial" font-size="10" fill="#534AB7">IMS Global CASE</text>

<rect x="422" y="492" width="216" height="50" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="530" y="511" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#26215C">IEP / HR systems</text>
<text x="530" y="530" text-anchor="middle" font-family="Arial" font-size="10" fill="#534AB7">ADA compliance docs</text>

<text x="42" y="568" font-family="Arial" font-size="10" fill="#444441">Open, platform-independent — any VR system can implement · any institution can consume · no vendor lock-in</text>
</svg>
