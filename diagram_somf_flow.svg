<svg width="680" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SOMF data flow — raw VR events to portable competency records</title>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  </marker>
  <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="480" fill="white"/>

<!-- Title -->
<text x="340" y="20" text-anchor="middle" font-family="Arial" font-size="12" fill="#444441">SOMF — from proprietary VR events to portable competency records</text>

<!-- Raw inputs -->
<rect x="42" y="34" width="180" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="132" y="59" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#2C2C2A">Performance events</text>

<rect x="238" y="34" width="180" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="328" y="59" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#2C2C2A">NIL interaction log</text>

<rect x="434" y="34" width="204" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="536" y="59" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#2C2C2A">Session metadata</text>

<!-- Down arrows -->
<line x1="132" y1="74" x2="132" y2="118" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arr2)"/>
<line x1="328" y1="74" x2="328" y2="118" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arr2)"/>
<line x1="536" y1="74" x2="536" y2="118" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arr2)"/>

<!-- Telemetry collector -->
<rect x="42" y="120" width="596" height="52" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="340" y="141" text-anchor="middle" font-family="Arial" font-size="13" font-weight="500" fill="#085041">Telemetry collector — normalization</text>
<text x="340" y="161" text-anchor="middle" font-family="Arial" font-size="11" fill="#0F6E56">Heterogeneous event streams → common internal schema-agnostic format</text>

<line x1="340" y1="172" x2="340" y2="208" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

<!-- Competency mapper + domain schema -->
<rect x="42" y="210" width="284" height="52" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="184" y="231" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#085041">Competency mapper</text>
<text x="184" y="251" text-anchor="middle" font-family="Arial" font-size="11" fill="#0F6E56">Events → competency claims</text>

<rect x="342" y="210" width="296" height="52" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="490" y="231" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#085041">Domain schema library</text>
<text x="490" y="251" text-anchor="middle" font-family="Arial" font-size="11" fill="#0F6E56">Healthcare · workforce · education</text>

<line x1="184" y1="262" x2="184" y2="300" stroke="#1D9E75" stroke-width="1" fill="none" marker-end="url(#arr)"/>
<line x1="490" y1="262" x2="490" y2="300" stroke="#1D9E75" stroke-width="1" fill="none" marker-end="url(#arr)"/>

<!-- xAPI generator -->
<rect x="42" y="302" width="596" height="52" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="340" y="323" text-anchor="middle" font-family="Arial" font-size="13" font-weight="500" fill="#085041">xAPI statement generator + schema validator</text>
<text x="340" y="343" text-anchor="middle" font-family="Arial" font-size="11" fill="#0F6E56">IEEE P2048 · IMS Global CASE · ADL xAPI profiles · WCAG 2.1 accessibility flags</text>

<line x1="340" y1="354" x2="340" y2="390" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

<!-- Output boxes -->
<rect x="42" y="392" width="144" height="46" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="114" y="409" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#26215C">xAPI JSON-LD</text>
<text x="114" y="427" text-anchor="middle" font-family="Arial" font-size="11" fill="#534AB7">LRS compatible</text>

<rect x="202" y="392" width="144" height="46" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="274" y="409" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#26215C">IMS Global CASE</text>
<text x="274" y="427" text-anchor="middle" font-family="Arial" font-size="11" fill="#534AB7">Credentialing export</text>

<rect x="362" y="392" width="144" height="46" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="434" y="409" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#26215C">IEP-compatible</text>
<text x="434" y="427" text-anchor="middle" font-family="Arial" font-size="11" fill="#534AB7">Progress records</text>

<rect x="522" y="392" width="116" height="46" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="580" y="409" text-anchor="middle" font-family="Arial" font-size="12" font-weight="500" fill="#26215C">REST API</text>
<text x="580" y="427" text-anchor="middle" font-family="Arial" font-size="11" fill="#534AB7">Real-time push</text>

<text x="42" y="468" font-family="Arial" font-size="11" fill="#444441">Same training session → comparable records across any institution, any VR platform</text>
</svg>
